<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<meta name="description" content="Page not found - Earnigma Quiz">
<title>404 - Page Not Found | Earnigma Quiz</title>
<link rel="canonical" href="https://earnigma.github.io/">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  :root { --cream: #FFF8E7; --black: #111111; --teal: #00D4AA; --yellow: #FFD93D; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .error-code {
    font-size: clamp(4rem, 15vw, 8rem);
    font-weight: 900;
    letter-spacing: -4px;
    line-height: 1;
    margin-bottom: 16px;
    background: linear-gradient(135deg, var(--teal), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  h1 { font-size: clamp(1.2rem, 3vw, 1.6rem); font-weight: 700; margin-bottom: 12px; }
  p { color: #555; font-size: 1rem; max-width: 400px; margin-bottom: 32px; line-height: 1.6; }
  .btn {
    background: var(--teal);
    border: 3px solid var(--black);
    padding: 14px 32px;
    font-weight: 800;
    font-size: 0.9rem;
    text-decoration: none;
    color: var(--black);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 5px 5px 0px var(--black);
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px var(--black); }
  .logo-bottom {
    margin-top: 48px;
    font-weight: 900;
    font-size: 1.1rem;
    text-decoration: none;
    color: var(--black);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-bottom span { color: #FF6B9D; }
</style>
</head>
<body>
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>This page does not exist or has been moved. But you can still earn free crypto by answering quizzes on Telegram.</p>
  <a href="/" class="btn">← Back to Earnigma Quiz</a>
  <a href="/" class="logo-bottom">EARNIGMA<span>QUIZ</span></a>
</body>
</html>
